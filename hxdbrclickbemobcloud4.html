<!DOCTYPE html>
<html>
<head>
  <title>My First HTML</title>
  <meta charset="UTF-8">

  <style>
    .btn {
      padding: 10px 20px;
      text-decoration: none;
      color: white;
      border-radius: 5px;
      font-size: 16px;
      display: inline-block;
      margin-right: 10px;
    }

    .btn1 {
      background-color: red;
    }

    .btn2 {
      background-color: blue;
    }

  </style>

</head>
<body>

<p>The HTML head element contains meta data.</p>
<p>Meta data is data about the HTML document.</p>

<p>
  <a href="https://hxdbr.click.bemobcloud.com/click/1" class="btn btn1">Click</a>

  <a href="https://hxdbr.click.bemobcloud.com/click/2" class="btn btn2">Test</a>

</p>

</body>
</html>
