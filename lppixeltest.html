    <!-- Новый BeMob Pixel -->
    <script type="text/javascript">
    function bemobCb(params) {
        var t = params.trackingDomain + '/click/';
        var re = new RegExp(t + '?(\\d*)');
        var e = document.querySelectorAll('a[href*="' + t + '"]');

        for (var i = 0; i < e.length; i++) {
            var ex = re.exec(e[i].href);
            if (ex) {
                e[i].href = params.ctaSecureUrl.replace(
                    '%%OFFER_NUMBER%%',
                    ex[1] || 1
                );
            }
        }
    }
    </script>

    <script type="text/javascript">
    !function(){
        var a = document.createElement("script");
        a.type = "text/javascript";

        a.src = "https://64neb.bemobtrcks.com/landing/6764040e-a380-4ff7-98ea-b23af9ba9228?callback=bemobCb&rule=1&path=1&landing=1&" 
                + window.location.search.substring(1);

        var b = document.getElementsByTagName("script")[0];
        b.parentNode.insertBefore(a, b);
    }();
    </script>
